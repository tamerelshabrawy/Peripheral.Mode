<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Preview — Peripheral.Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        .legend {
            position: fixed; bottom: 20px; left: 20px; background: white;
            padding: 12px 16px; border-radius: 8px; z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 13px; line-height: 1.8;
        }
        .legend b { font-size: 14px; }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .toggle-panel {
            position: fixed; top: 10px; right: 10px; background: white;
            padding: 10px 14px; border-radius: 8px; z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 13px;
        }
        .toggle-panel label { display: block; margin: 4px 0; cursor: pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <b>Route Preview</b><br>
        <span class="dot" style="background:#2196F3"></span> ROUTE_LINE (inner / right_side)<br>
        <span class="dot" style="background:#F44336"></span> OUTER_BORDER (outer / left_side)<br>
        <span class="dot" style="background:#4CAF50"></span> Start point<br>
        <span class="dot" style="background:#FF9800"></span> End point<br>
        <span class="dot" style="background:#9C27B0"></span> Zone breakpoint markers<br>
        <span class="dot" style="background:#795548"></span> Old route (PeripheralMode)
    </div>
    <div class="toggle-panel">
        <b>Toggle layers</b>
        <label><input type="checkbox" id="togRoute" checked> ROUTE_LINE (blue)</label>
        <label><input type="checkbox" id="togOuter" checked> OUTER_BORDER (red)</label>
        <label><input type="checkbox" id="togZones" checked> Zone markers</label>
        <label><input type="checkbox" id="togOld" checked> Old route (brown)</label>
        <label><input type="checkbox" id="togOldOuter" checked> Old outer (brown dashed)</label>
    </div>

    <script>
    // ── NEW ROUTE_LINE (Feature 2 from user GeoJSON, 53 points) ──────────
    // [lon, lat] format — Leaflet needs [lat, lon] so we flip below
    var ROUTE_LINE = [
        [29.9068798, 31.1997637], [29.9062710, 31.1995091], [29.9062334, 31.1994953],
        [29.9067001, 31.1987153], [29.9069442, 31.1982679], [29.9068128, 31.1982013],
        [29.9063140, 31.1979950], [29.9054422, 31.1976577], [29.9050801, 31.1975086],
        [29.9047234, 31.1973847], [29.9045062, 31.1973021], [29.9043264, 31.1974558],
        [29.9040448, 31.1977449], [29.9037927, 31.1979835], [29.9028110, 31.1988852],
        [29.9017891, 31.1998180], [29.9010863, 31.2004627], [29.9007162, 31.2008068],
        [29.9006894, 31.2009399], [29.9004265, 31.2011808], [29.9000912, 31.2014652],
        [29.8999169, 31.2015983], [29.8997774, 31.2017245], [29.8996728, 31.2017750],
        [29.8983827, 31.2012244], [29.8984873, 31.2009490], [29.8987448, 31.2004787],
        [29.8989245, 31.2000635], [29.8990103, 31.1998799], [29.8991444, 31.1997790],
        [29.8994100, 31.1996138], [29.8995012, 31.1995197], [29.8996111, 31.1992995],
        [29.8998552, 31.1987970], [29.9000215, 31.1984541], [29.9002280, 31.1980044],
        [29.9005124, 31.1974193], [29.9006196, 31.1971692], [29.9007644, 31.1968479],
        [29.9009012, 31.1965405], [29.9009924, 31.1963042], [29.9011131, 31.1960495],
        [29.9011802, 31.1959050], [29.9016281, 31.1960862], [29.9018910, 31.1961918],
        [29.9022423, 31.1963111], [29.9026579, 31.1964716], [29.9029583, 31.1965841],
        [29.9032319, 31.1966850], [29.9034170, 31.1967470], [29.9035350, 31.1966781],
        [29.9038086, 31.1965795], [29.9041573, 31.1964762]
    ];

    // ── NEW OUTER_BORDER (Feature 7 from user GeoJSON, 38 points) ────────
    var OUTER_BORDER = [
        [29.8999869, 31.2006768], [29.8999367, 31.2006290], [29.8995573, 31.2002376],
        [29.8993145, 31.1999560], [29.8991862, 31.1998486], [29.8993145, 31.1997627],
        [29.8994429, 31.1996720], [29.8995182, 31.1996243], [29.8996382, 31.1994024],
        [29.8997777, 31.1991494], [29.8998781, 31.1989107], [29.9000706, 31.1985098],
        [29.9002353, 31.1981447], [29.9004333, 31.1977389], [29.9005896, 31.1974239],
        [29.9009104, 31.1967581], [29.9009914, 31.1965385], [29.9012173, 31.1960564],
        [29.9014498, 31.1961414], [29.9020089, 31.1963440], [29.9022807, 31.1964536],
        [29.9025603, 31.1965599], [29.9028282, 31.1966596], [29.9030845, 31.1967791],
        [29.9033951, 31.1969087], [29.9035077, 31.1969386], [29.9036126, 31.1967891],
        [29.9037951, 31.1967260], [29.9040552, 31.1966596], [29.9043426, 31.1965964],
        [29.9045367, 31.1965666], [29.9048746, 31.1965499], [29.9050920, 31.1966230],
        [29.9054570, 31.1967692], [29.9054997, 31.1968057], [29.9052357, 31.1972707],
        [29.9051852, 31.1973770], [29.9051774, 31.1973803]
    ];

    // ── OLD ROUTE_LINE (from PeripheralMode, for comparison) ─────────────
    var OLD_ROUTE = [
        [29.9042702, 31.1971939], [29.9042697, 31.1971939], [29.9041345, 31.1974428],
        [29.9039240, 31.1976572], [29.9037191, 31.1978710], [29.9035805, 31.1980146],
        [29.9034668, 31.1981114], [29.9032732, 31.1982327], [29.9030305, 31.1984446],
        [29.9029072, 31.1985722], [29.9027810, 31.1987394], [29.9026791, 31.1988579],
        [29.9025586, 31.1989869], [29.9022687, 31.1992511], [29.9019591, 31.1995458],
        [29.9019591, 31.1995458], [29.9015999, 31.1998636], [29.9013854, 31.2000587],
        [29.9011287, 31.2002840], [29.9008607, 31.2005171], [29.9005950, 31.2007425],
        [29.9003518, 31.2009563], [29.8996133, 31.2010997], [29.8995806, 31.2014050],
        [29.8992918, 31.2012976], [29.8988268, 31.2011214], [29.8985785, 31.2010352],
        [29.8988634, 31.2004477], [29.8990220, 31.2001435], [29.8991065, 31.1999369],
        [29.8993131, 31.1997794], [29.8995214, 31.1996210], [29.9000878, 31.1984075],
        [29.9002448, 31.1980737], [29.9003473, 31.1978637], [29.9004363, 31.1976696],
        [29.9005354, 31.1974520], [29.9007290, 31.1970330], [29.9008214, 31.1968278],
        [29.9009196, 31.1966127], [29.9009838, 31.1964567], [29.9010204, 31.1963777],
        [29.9010739, 31.1962588], [29.9011093, 31.1961634], [29.9011600, 31.1960329],
        [29.9026919, 31.1965935], [29.9030252, 31.1967192], [29.9032994, 31.1968217],
        [29.9035612, 31.1969195], [29.9038177, 31.1970196], [29.9040266, 31.1970967],
        [29.9042715, 31.1971886]
    ];

    // ── OLD OUTER_BORDER ─────────────────────────────────────────────────
    var OLD_OUTER = [
        [29.8985742,31.2008868],[29.8990142,31.199963],[29.8990518,31.1999074],
        [29.8991099,31.1998557],[29.899243,31.1997604],[29.8994968,31.1995653],
        [29.9002479,31.1980143],[29.9006458,31.1971429],[29.9009235,31.19653],
        [29.9010238,31.1962815],[29.9011116,31.1960526],[29.9011711,31.1959355],
        [29.9023496,31.1963765],[29.9042378,31.1970997],[29.9045246,31.1972019],
        [29.9047666,31.1973246],[29.9035848,31.1982192],[29.9025919,31.1990843],
        [29.902556,31.1991073],[29.9007485,31.200883],[29.9004258,31.2011948],
        [29.9000345,31.2015219],[29.8997148,31.2018949],[29.8987045,31.2014517],
        [29.8982799,31.2012772],[29.898292,31.2010923],[29.8984827,31.2009557],
        [29.8985562,31.2009262],[29.8985764,31.2008867]
    ];

    // ── Helpers ──────────────────────────────────────────────────────────
    function flip(coords) { return coords.map(function(c) { return [c[1], c[0]]; }); }

    function segLength(a, b) {
        var dx = (b[0] - a[0]) * 111319 * Math.cos((a[1] + b[1]) / 2 * Math.PI / 180);
        var dy = (b[1] - a[1]) * 111319;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function computeArcLengths(line) {
        var lengths = [0];
        for (var i = 1; i < line.length; i++) {
            lengths.push(lengths[i-1] + segLength(line[i-1], line[i]));
        }
        return lengths;
    }

    function interpAtProgress(line, arcs, p) {
        var target = p * arcs[arcs.length - 1];
        for (var i = 1; i < arcs.length; i++) {
            if (arcs[i] >= target) {
                var segStart = arcs[i-1], segEnd = arcs[i];
                var t = (segEnd > segStart) ? (target - segStart) / (segEnd - segStart) : 0;
                return [
                    line[i-1][0] + t * (line[i][0] - line[i-1][0]),
                    line[i-1][1] + t * (line[i][1] - line[i-1][1])
                ];
            }
        }
        return line[line.length - 1];
    }

    // ── Preliminary zone breakpoints (evenly distributed for preview) ────
    // Track1: z1-6 (0-15%), Trans: z7-10 (15-22%), Track2: z11-25 (22-45%),
    // Trans: z26-27 (45-48%), Track3: z28-31 (48-65%), Track4: z32-35 (65-100%)
    var ZONE_BREAKPOINTS = [];
    // Track 1: zones 1-6 → 0% to 15%
    for (var i = 0; i < 6; i++) ZONE_BREAKPOINTS.push((i + 1) * 0.15 / 6);
    // Transition: zones 7-10 → 15% to 22%
    for (var i = 0; i < 4; i++) ZONE_BREAKPOINTS.push(0.15 + (i + 1) * 0.07 / 4);
    // Track 2: zones 11-25 → 22% to 45%
    for (var i = 0; i < 15; i++) ZONE_BREAKPOINTS.push(0.22 + (i + 1) * 0.23 / 15);
    // Transition: zones 26-27 → 45% to 48%
    for (var i = 0; i < 2; i++) ZONE_BREAKPOINTS.push(0.45 + (i + 1) * 0.03 / 2);
    // Track 3: zones 28-31 → 48% to 65%
    for (var i = 0; i < 4; i++) ZONE_BREAKPOINTS.push(0.48 + (i + 1) * 0.17 / 4);
    // Track 4: zones 32-35 → 65% to 100%
    for (var i = 0; i < 4; i++) ZONE_BREAKPOINTS.push(0.65 + (i + 1) * 0.35 / 4);

    var ZONE_COLORS = {
        'Track 1': '#4CAF50', 'Transition 1-2': '#FFEB3B',
        'Track 2': '#2196F3', 'Transition 2-3': '#FF9800',
        'Track 3': '#9C27B0', 'Track 4': '#F44336'
    };
    function zoneLabel(z) {
        if (z <= 6) return 'Track 1';
        if (z <= 10) return 'Transition 1-2';
        if (z <= 25) return 'Track 2';
        if (z <= 27) return 'Transition 2-3';
        if (z <= 31) return 'Track 3';
        return 'Track 4';
    }
    function zoneColor(z) { return ZONE_COLORS[zoneLabel(z)] || '#999'; }

    // ── Build Map ────────────────────────────────────────────────────────
    var map = L.map('map').setView([31.1985, 29.9030], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // New route (blue)
    var routeLayer = L.polyline(flip(ROUTE_LINE), {
        color: '#2196F3', weight: 4, opacity: 0.9
    }).addTo(map);

    // New outer border (red)
    var outerLayer = L.polyline(flip(OUTER_BORDER), {
        color: '#F44336', weight: 3, opacity: 0.7, dashArray: '8,6'
    }).addTo(map);

    // Old route (brown solid)
    var oldRouteLayer = L.polyline(flip(OLD_ROUTE), {
        color: '#795548', weight: 3, opacity: 0.5
    }).addTo(map);

    // Old outer (brown dashed)
    var oldOuterLayer = L.polyline(flip(OLD_OUTER), {
        color: '#795548', weight: 2, opacity: 0.4, dashArray: '4,8'
    }).addTo(map);

    // Start marker (green)
    var startPt = ROUTE_LINE[0];
    L.circleMarker([startPt[1], startPt[0]], {
        radius: 10, color: '#4CAF50', fillColor: '#4CAF50', fillOpacity: 0.9, weight: 2
    }).addTo(map).bindPopup('<b>START</b><br>Zone 1<br>[' + startPt[0].toFixed(4) + ', ' + startPt[1].toFixed(4) + ']');

    // End marker (orange)
    var endPt = ROUTE_LINE[ROUTE_LINE.length - 1];
    L.circleMarker([endPt[1], endPt[0]], {
        radius: 10, color: '#FF9800', fillColor: '#FF9800', fillOpacity: 0.9, weight: 2
    }).addTo(map).bindPopup('<b>END</b><br>Zone 35<br>[' + endPt[0].toFixed(4) + ', ' + endPt[1].toFixed(4) + ']');

    // Zone breakpoint markers (purple)
    var arcs = computeArcLengths(ROUTE_LINE);
    var totalM = arcs[arcs.length - 1];
    var zoneMarkers = L.layerGroup().addTo(map);

    for (var z = 0; z < ZONE_BREAKPOINTS.length; z++) {
        var p = (z === 0) ? ZONE_BREAKPOINTS[0] / 2 : (ZONE_BREAKPOINTS[z-1] + ZONE_BREAKPOINTS[z]) / 2;
        var pt = interpAtProgress(ROUTE_LINE, arcs, p);
        var zNum = z + 1;
        var col = zoneColor(zNum);
        L.circleMarker([pt[1], pt[0]], {
            radius: 7, color: col, fillColor: col, fillOpacity: 0.8, weight: 1
        }).addTo(zoneMarkers).bindPopup(
            '<b>Zone ' + zNum + '</b><br>' + zoneLabel(zNum) +
            '<br>Progress: ' + (ZONE_BREAKPOINTS[z] * 100).toFixed(1) + '%'+
            '<br>~' + Math.round(ZONE_BREAKPOINTS[z] * totalM) + 'm / ' + Math.round(totalM) + 'm'
        );
    }

    // Museum marker
    L.marker([31.1995114, 29.9062817]).addTo(map)
        .bindPopup('<b>Greco-Roman Museum</b><br>(reference point)');

    // Total distance readout
    L.control.attribution({prefix:
        'Total ROUTE_LINE: <b>' + Math.round(totalM) + ' m</b> | ' +
        ZONE_BREAKPOINTS.length + ' zones'
    }).addTo(map);

    // Fit bounds to show everything
    var allPts = flip(ROUTE_LINE).concat(flip(OUTER_BORDER)).concat(flip(OLD_ROUTE));
    map.fitBounds(L.latLngBounds(allPts).pad(0.05));

    // ── Toggle controls ──────────────────────────────────────────────────
    document.getElementById('togRoute').addEventListener('change', function() {
        this.checked ? map.addLayer(routeLayer) : map.removeLayer(routeLayer);
    });
    document.getElementById('togOuter').addEventListener('change', function() {
        this.checked ? map.addLayer(outerLayer) : map.removeLayer(outerLayer);
    });
    document.getElementById('togZones').addEventListener('change', function() {
        this.checked ? map.addLayer(zoneMarkers) : map.removeLayer(zoneMarkers);
    });
    document.getElementById('togOld').addEventListener('change', function() {
        this.checked ? map.addLayer(oldRouteLayer) : map.removeLayer(oldRouteLayer);
    });
    document.getElementById('togOldOuter').addEventListener('change', function() {
        this.checked ? map.addLayer(oldOuterLayer) : map.removeLayer(oldOuterLayer);
    });
    </script>
</body>
</html>
